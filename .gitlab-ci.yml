image: ubuntu:22.04

variables:
  BAZELISK_VERSION: "latest"
  JAVA_HOME: "/usr/lib/jvm/java-21-openjdk-amd64"

stages:
  - build
  - test
  - benchmark
  - deploy

before_script:
  - apt-get update
  - apt-get install -y curl git python3 sshpass build-essential openjdk-21-jdk
  - curl -L https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o /usr/local/bin/bazel
  - chmod +x /usr/local/bin/bazel
  - export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
  - export PATH="$JAVA_HOME/bin:$PATH"
  - which java
  - java -version
  - javac -version
  - jar --version
  - echo $JAVA_HOME
  - . ./env.sh

stages:
  - build
  - test
  - benchmark
  - deploy

build:
  stage: build
  script:
    - bazel build //...
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - .bazel
      - ~/.cache/bazel

test:
  stage: test
  script:
    - bazel test $(bazel query '//... except //benchmark/...')

  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: pull
    paths:
      - .bazel
      - ~/.cache/bazel

benchmark:
  stage: benchmark
  script:
    - bazel test //benchmark/... --test_output=errors
  allow_failure: true
  cache:
    - key: "$CI_COMMIT_REF_NAME"
      policy: pull
      paths:
        - .bazel
        - ~/.cache/bazel

    - key: benchmarks-$CI_COMMIT_REF_SLUG
      paths:
        - benchmark/*/.benchmark_bazel
      when: always
  #rules:
  #  - if: '$CI_COMMIT_REF_SLUG =~ /main/'
  tags:
    - benchmark

