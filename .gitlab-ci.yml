deployZip:
  stage: deploy
  script:
    - echo "JADEX_VERSION=$JADEX_VERSION"
    - env | grep JADEX
    - bazel build //application/launcher:launcher_deploy.jar
    - JAR=$(bazel cquery --output=files //application/launcher:launcher_deploy.jar)
    - USER=$(echo $dl_host | sed 's|ssh://\([^:]*\):.*|\1|')
    - PASSWORD=$(echo $dl_host | sed 's|ssh://[^:]*:\([^;@]*\).*|\1|')
    - HOST=$(echo $dl_host | sed 's|.*@\([^:]*\).*|\1|')
    - PORT=$(echo $dl_host | sed 's|.*:\([0-9]*\)$|\1|')
    - sshpass -p "$PASSWORD" ssh -o StrictHostKeyChecking=no -p $PORT $USER@$HOST "rm -rf /www/releases/$JADEX_VERSION && mkdir /www/releases/$JADEX_VERSION"
    - sshpass -p "$PASSWORD" scp -P $PORT $JAR $USER@$HOST:/www/releases/$JADEX_VERSION/
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: pull
    paths:
      - .bazel
      - ~/.cache/bazel
