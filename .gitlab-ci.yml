#image: eclipse-temurin:21-jdk-alpine
image: eclipse-temurin:21-jdk-noble

before_script:
  - GRADLE_USER_HOME="$(pwd)/.gradle"
  - export GRADLE_USER_HOME
  - apt update && apt install -y git xvfb
  - Xvfb :99 &
  - export DISPLAY=:99

stages:
  - build
  - test
  - benchmark
  - deploy

build:
  stage: build
  script: 
    - cat build.gradle
    - ./gradlew --build-cache assemble
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - '**/build'
      - .gradle

test:
  stage: test
  script: ./gradlew test
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: pull
    paths:
      - '**/build'
      - .gradle

benchmark:
  stage: benchmark
  script:
    - ./benchmark.sh
  #timeout: 48h
  # needs: ["build"]
  allow_failure: true
  cache:
    - key: "$CI_COMMIT_REF_NAME"
      policy: pull
      paths:
        - '**/build'
        - .gradle
    
    # cache benchmark values to check against previous vals (pct)
    - key: benchmarks-$CI_COMMIT_REF_SLUG
      paths:
        - benchmark/*/.benchmark_gradle
      # also store benchmark data on failed job
      when: 'always'
  rules:
    - if: $CI_COMMIT_REF_SLUG=~"main"
  tags: [benchmark]

purge_benchmarks:
  stage: benchmark
  script: ./gradlew benchmark:purge
  cache:
    - key: "$CI_COMMIT_REF_NAME"
      policy: pull
      paths:
        - '**/build'
        - .gradle
    
    # cache benchmark values to check against previous vals (pct)
    - key: benchmarks-$CI_COMMIT_REF_SLUG
      paths:
        - benchmark/*/.benchmark_gradle
  when: manual
  tags: [benchmark]
  
deployZip:
  stage: deploy
  script:
    - ./gradlew deployZip
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: pull
    paths:
      - '**/build'
      - .gradle
  rules:
    - if: $CI_COMMIT_REF_SLUG=~"main"

deployCentral:
  stage: deploy
  script:
    - ./gradlew publish -P repos=central closeStagingRepo releaseStagingRepo updateTag createGHRelease
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: pull
    paths:
      - '**/build'
      - .gradle
  when: manual
  rules:
    - if: $CI_COMMIT_REF_SLUG=~"main"
