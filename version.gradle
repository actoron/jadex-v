// pass version prefix, e.g. from environment variable,
// and return the next build name by finding next version number from git tags.
Object fetchNextBuildNameFromGitTag(jversionpre)
{
	if (jversionpre==null || jversionpre.trim().length()==0)
		return null;
		
	// Check if working dir is dirty
	def p1 = "git status --porcelain --untracked-files=no".execute()
	p1.waitFor()
	def status = p1.exitValue()
	if(status==0)
    {
        def txt = p1.text;
        if (txt.length() > 0)
        {
            throw new Exception("Working directory contains changes. Please commit or stash changes before publishing.");
        }
    }
    else
    {
        throw new Exception("Failed to check working directory status for publishing.");
    }

	vnum	= getLatestVersion(jversionpre);
	if (vnum != null) {
		// Existing version. check, if we need to increment
		def jversion = jversionpre + vnum;
		println "Latest version is "+jversion;
        if(!isHead(jversion)) {
        	vnum++;
        	jversion = jversionpre+vnum;
        }
        return jversion;
    }
    else
    {
    	// New version. use e.g. '5.3.0' for prefix '5.3.', but '5.3-beta1' for prefix '5.3-beta'
    	println "No version found with prefix "+jversionpre
        return jversionpre + (jversionpre.endsWith(".") ? "0" : "1");
    }
}


// Fetch all tags matching the given prefix and
// return the latest version.
Integer getLatestVersion(versionprefix)
{
	def	vnum = null;
	def git = "git log --tags=${versionprefix}* --no-walk --format=%D";
	//logger.lifecycle "git command: "+git
	
	def p1 = git.execute()
	p1.waitFor()
	//logger.lifecycle p1.errorStream.text
	
	def status = p1.exitValue()
	if(status==0)
	{
		def txt = p1.text;
		if (txt.length() > 0)
		{
			def tags = txt.split("\\n")
			
			//logger.lifecycle "tags are: "+ tags
		
			for(String tag: tags)
			{
				println 'checking tag> ' + tag;
				if(tag.contains("tag: "+versionprefix))
				{
					tag	= tag.substring(tag.indexOf("tag: "+versionprefix)+("tag: "+versionprefix).length()).trim()
					if(tag.indexOf("-")!=-1)	// Strip suffix from tag
						tag	= tag.substring(0, tag.indexOf("-")).trim();
					if(tag.indexOf(",")!=-1)	// Strip git branch names after tag
						tag	= tag.substring(0, tag.indexOf(",")).trim();
					
					println 'version part of tag is> "' + tag + '"'
					
					// Only consider tags conforming to <prefix><number> or <prefix><number>-<suffix>
					if(tag.matches("\\d+"))
					{
					 	vnum = vnum!=null ? Math.max(vnum, tag as Integer) : tag as Integer;
					}
					else
					{
						println "ignored "+tag
					}
				}
			}
		}
	}
	return vnum
}

